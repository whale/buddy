name: Auto version bump

# Bumps the patch version on every merge/push to main, keeping package.json,
# src-tauri/tauri.conf.json and src-tauri/Cargo.toml in sync.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip the bot's own bump commit so it doesn't loop.
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/bump-version.mjs
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --cached --quiet || git commit -m "chore: bump version [skip ci]"
          git push
