name: Auto version bump

# Bumps the patch version on every merge/push to main, keeping package.json,
# src-tauri/tauri.conf.json and src-tauri/Cargo.toml in sync. The app shows this
# version in Settings (read from CARGO_PKG_VERSION).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Don't re-trigger on the bot's own bump commit.
    if: ${{ !contains(github.event.head_commit.message, 'chore: bump version') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump patch version in all three files
        run: |
          node -e '
            const fs = require("fs");
            const bump = v => { const p = v.split("."); p[2] = String((+p[2]||0) + 1); return p.join("."); };
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const nv = bump(pkg.version);
            pkg.version = nv;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            const tc = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
            tc.version = nv;
            fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(tc, null, 2) + "\n");
            let cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
            cargo = cargo.replace(/^version = ".*"$/m, `version = "${nv}"`);
            fs.writeFileSync("src-tauri/Cargo.toml", cargo);
            console.log("Bumped to " + nv);
          '
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version [skip ci]" || { echo "nothing to bump"; exit 0; }
          git push
