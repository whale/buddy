name: Buddy

# ─────────────────────────────────────────────────────────────────────────────
# Buddy iOS — native SwiftUI companion to the macOS menu-bar app.
# This file is the source of truth for the Xcode project. Regenerate with:
#   xcodegen generate
# The generated Buddy.xcodeproj is .gitignored on purpose.
# ─────────────────────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: fyi.whale
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.4.24"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    CODE_SIGN_STYLE: Automatic
    # Team pinned so it survives `xcodegen generate` — no more
    # re-picking the team in Xcode's Signing tab after every regen.
    DEVELOPMENT_TEAM: 9QDAAYWU9X

targets:
  Buddy:
    type: application
    platform: iOS
    sources:
      - path: Buddy/Sources
      - path: Buddy/Resources
    info:
      path: Buddy/Info.plist
      properties:
        CFBundleName: Buddy
        CFBundleDisplayName: Buddy
        CFBundleIconName: AppIcon
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Optional: set to the deployed /api/bug-report endpoint so iOS users can
        # file private GitHub issues without needing a GitHub account. Blank = email fallback.
        BuddyBugReportEndpoint: ""
        # Background refresh: periodic sync while the app is closed (BGAppRefreshTask).
        # iOS chooses the actual times; this narrows staleness, it doesn't eliminate it.
        UIBackgroundModes: [fetch]
        BGTaskSchedulerPermittedIdentifiers: [fyi.whale.buddy.refresh]
        UILaunchScreen:
          UIColorName: ""
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Allow plain-HTTP loads to localhost/LAN so sync can reach a local Supabase
        # (127.0.0.1:54321) in dev. Production hosted Supabase is HTTPS (ATS-clean).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Camera is used ONLY to scan the pairing QR code shown on the Mac.
        NSCameraUsageDescription: Buddy uses the camera to scan the pairing QR code from your Mac to set up sync.
        # Geist (SIL OFL) — the Mac app's typeface. Bundled as static OTFs so the
        # iPhone shares Buddy's exact type language. PostScript names: Geist-<Weight>.
        UIAppFonts:
          - Geist-Regular.otf
          - Geist-Medium.otf
          - Geist-SemiBold.otf
          - Geist-Bold.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.whale.buddy
        PRODUCT_NAME: Buddy
        GENERATE_INFOPLIST_FILE: NO
        # macOS-26/iOS-26 era icon: AppIcon.icon (Icon Composer package) in
        # Resources is the single source; actool derives the legacy renditions
        # for iOS 17/18 and the 1024 marketing icon from it.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES


  BuddyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Buddy/UITests
    dependencies:
      - target: Buddy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.whale.buddyUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Buddy

  # Unit tests (sync step 3: the pure merge() suite). Logic-only — no host app
  # needed, so it runs fast on any simulator without signing the app.
  BuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Buddy/Tests
    dependencies:
      - target: Buddy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.whale.buddyTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Buddy:
    build:
      targets:
        Buddy: all
        BuddyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BuddyTests
        - BuddyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
