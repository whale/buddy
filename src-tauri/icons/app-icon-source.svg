<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Full-bleed white tile — NO baked corners. iOS and macOS 26+ both mask app
       icons into their rounded shape themselves; baking a dark tile is what read
       as a "black border" inside the system squircle (whale 2026-07-17). -->
  <rect x="0" y="0" width="1024" height="1024" fill="#FFFFFF"/>
  <!-- Lucide "sticker" glyph centered: 24-grid (visual box 19.02 units incl. stroke)
       scaled 44.4795x -> glyph 846px, padding 89px (60% less than the old 222px). -->
  <g transform="translate(-21.754,-21.754) scale(44.4795)">
    <!-- Red folded corner flap — outer edge follows the black outline's curve exactly so no white seam shows -->
    <path d="M15 3v5a1 1 0 0 0 1 1h5a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 15 3Z" fill="#FF4342"/>
    <!-- Black outline + fold + face -->
    <g fill="none" stroke="#000000" stroke-width="1.02" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 9a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 15 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z" />
      <path d="M15 3v5a1 1 0 0 0 1 1h5" />
      <path d="M8 13h.01" />
      <path d="M16 13h.01" />
      <path d="M10 16s.8 1 2 1c1.3 0 2-1 2-1" />
    </g>
  </g>
</svg>
